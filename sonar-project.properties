## SonarQube project configuration
# Do not commit secrets (sonar.login). Provide the token via environment variable.
sonar.projectKey=cyberx_project
sonar.projectName=CyberX Project (website)
sonar.projectVersion=1.0
sonar.sources=src
sonar.exclusions=**/node_modules/**,dist/**,build/**

# Usage:
# 1) Set the token in environment variable `SONARQUBE_TOKEN` (or in CI as a secret).
# 2) Run sonar scanner with the token passed to `-Dsonar.login` or use the provided npm script:
#      npm run sonar:scan
# The npm script will run a small pre-check and invoke `sonar-scanner`.
